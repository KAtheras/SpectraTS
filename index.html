<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>Timesheet Studio</title>
    <meta
      name="description"
      content="A standalone timesheet app that can be hosted on Netlify and embedded in WordPress with an iframe."
    />
    <link rel="stylesheet" href="./styles.css?v=20260313-34" />
  </head>
  <body>
    <div class="auth-shell" id="auth-shell" hidden>
      <section class="panel auth-panel">
        <div class="auth-panel-copy">
          <p class="panel-label">SpectraTS</p>
          <h1 class="auth-title">Timesheet access</h1>
          <p class="panel-subtext" id="auth-subtext">
            Sign in with your team member credentials to continue.
          </p>
        </div>

        <form id="login-form" class="auth-form">
          <label>
            <span>Username</span>
            <input type="text" name="username" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button class="button" type="submit">Sign in</button>
        </form>

        <form id="bootstrap-form" class="auth-form" hidden>
          <label>
            <span>Admin name</span>
            <input type="text" name="display_name" autocomplete="name" required />
          </label>
          <label>
            <span>Username</span>
            <input type="text" name="username" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" autocomplete="new-password" required />
          </label>
          <button class="button" type="submit">Create admin account</button>
        </form>

        <p id="auth-feedback" class="feedback auth-feedback" aria-live="polite"></p>
      </section>
    </div>

    <div class="page-shell" id="app-shell" hidden>
      <div class="shell-inner">
        <div class="app-topbar">
          <div class="session-indicator" id="session-indicator" hidden></div>
          <div class="app-topbar-actions">
            <button class="button button-ghost" id="manage-users" type="button" hidden>
              Members
            </button>
            <button class="button button-ghost" id="open-catalog" type="button">
              Clients
            </button>
            <button class="button button-ghost" id="theme-toggle" type="button">
              Dark/Light
            </button>
            <button class="button button-ghost" id="logout-button" type="button" hidden>
              Log out
            </button>
          </div>
        </div>

        <main class="app-frame">
          <section class="panel-stack">
            <section class="panel panel-form">
              <div class="panel-head">
                <div>
                  <h2 id="form-heading">Add timesheet entry</h2>
                </div>
                <div class="panel-head-actions">
                  <button class="button button-ghost" id="cancel-edit" hidden>
                    Cancel
                  </button>
                </div>
              </div>

            <form id="entry-form" class="entry-form">
              <label class="entry-pill">
                <span>Team member</span>
                <select name="user" id="entry-user" required></select>
              </label>

              <label class="entry-pill">
                <span>Client</span>
                <select name="client" id="entry-client" required></select>
              </label>

              <label class="entry-pill">
                <span>Project</span>
                <select name="project" id="entry-project" required></select>
              </label>

              <label class="entry-date-field">
                <span>Date</span>
                <div class="wheel-date-picker">
                  <input type="hidden" name="date" required />
                  <select id="entry-date-month" aria-label="Month"></select>
                  <select id="entry-date-day" aria-label="Day"></select>
                  <select id="entry-date-year" aria-label="Year"></select>
                </div>
              </label>

              <label class="span-2 hours-field">
                <span>Hours</span>
                <div class="entry-helpers entry-helpers-hours">
                  <input type="hidden" name="hours" required />
                  <div class="preset-row">
                    <div class="preset-buttons" id="hour-presets">
                      <button class="chip-button" type="button" data-hours="0.5">0.5h</button>
                      <button class="chip-button" type="button" data-hours="1">1h</button>
                      <button class="chip-button" type="button" data-hours="1.5">1.5h</button>
                      <button class="chip-button" type="button" data-hours="2">2h</button>
                      <button class="chip-button" type="button" data-hours="2.5">2.5h</button>
                      <button class="chip-button" type="button" data-hours="3">3h</button>
                      <label class="other-hours">
                        <input
                          type="number"
                          id="other-hours"
                          min="0.25"
                          max="24"
                          step="0.25"
                          placeholder="Other"
                        />
                      </label>
                    </div>
                  </div>
                </div>
              </label>

              <div class="notes-actions-row span-2">
                <label class="notes-field">
                  <span>Notes</span>
                  <textarea
                    name="notes"
                    rows="1"
                  ></textarea>
                </label>

                <div class="form-actions form-actions-entry">
                  <span class="field-spacer" aria-hidden="true">Notes</span>
                  <button class="button" type="submit" id="submit-entry">
                    Save
                  </button>
                </div>
              </div>
            </form>
          </section>
        </section>

        <section class="panel">
          <div class="panel-head panel-head-logged">
            <div class="panel-head-title-row">
              <h2>Logged time</h2>
              <div class="filter-total" id="filter-total-hours">Total hours: 0.00</div>
            </div>

            <div class="panel-head-actions">
              <button class="button button-ghost" type="button" id="clear-filters">
                Clear
              </button>
              <button class="button button-ghost" type="button" id="export-csv">
                Export CSV
              </button>
            </div>
          </div>

          <form id="filter-form" class="filters">
              <label>
                <span>User</span>
                <select name="user" id="filter-user"></select>
              </label>
              <label>
                <span>Client</span>
                <select name="client" id="filter-client"></select>
              </label>
              <label>
                <span>Project</span>
                <select name="project" id="filter-project"></select>
              </label>
              <label>
                <span>From</span>
                <input type="text" name="from" hidden />
                <div class="wheel-date-picker wheel-date-picker--compact" data-filter-date="from">
                  <select id="filter-from-month" aria-label="From month"></select>
                  <select id="filter-from-day" aria-label="From day"></select>
                  <select id="filter-from-year" aria-label="From year"></select>
                </div>
              </label>
              <label>
                <span>To</span>
                <input type="text" name="to" hidden />
                <div class="wheel-date-picker wheel-date-picker--compact" data-filter-date="to">
                  <select id="filter-to-month" aria-label="To month"></select>
                  <select id="filter-to-day" aria-label="To day"></select>
                  <select id="filter-to-year" aria-label="To year"></select>
                </div>
              </label>
              <label>
                <span>Search</span>
                <input
                  type="search"
                  name="search"
                  placeholder="Project or notes"
                />
              </label>
            </form>

          <p id="feedback" class="feedback" aria-live="polite"></p>
          <div id="active-filters" class="active-filters" hidden></div>

          <div class="table-wrap">
            <table class="entries-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>User</th>
                  <th>Client</th>
                  <th>Project</th>
                  <th>Hours</th>
                  <th>Notes</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="entries-body"></tbody>
            </table>
          </div>
          </section>
        </main>
      </div>

      <div class="modal-backdrop" id="catalog-modal" hidden aria-hidden="true">
        <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="catalog-modal-title">
          <section class="panel panel-breakdown panel-modal">
            <div class="panel-head">
              <div>
                <h2 id="catalog-modal-title">Manage Clients</h2>
              </div>
              <div class="panel-head-actions">
                <button
                  class="button button-ghost"
                  id="close-catalog"
                  type="button"
                  data-close-catalog
                >
                  Close
                </button>
              </div>
            </div>
            <div class="catalog-grid">
              <section class="catalog-column">
                <div class="catalog-column-head">
                  <span>Clients</span>
                </div>
                <form id="add-client-form" class="catalog-create">
                  <input
                    type="text"
                    name="client_name"
                    placeholder="Add client"
                    autocomplete="off"
                  />
                  <button class="mini-button" type="submit">Add</button>
                </form>
                <div id="client-list" class="catalog-list"></div>
              </section>
              <section class="catalog-column">
                <div class="catalog-column-head">
                  <span id="project-column-label">Projects</span>
                </div>
                <form id="add-project-form" class="catalog-create">
                  <input
                    type="text"
                    name="project_name"
                    placeholder="Add project"
                    autocomplete="off"
                  />
                  <button class="mini-button" type="submit">Add</button>
                </form>
                <div id="project-list" class="catalog-list"></div>
              </section>
            </div>
          </section>
        </div>
      </div>

      <div class="modal-backdrop" id="users-modal" hidden aria-hidden="true">
        <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="users-modal-title">
          <section class="panel panel-modal">
            <div class="panel-head">
              <div>
                <h2 id="users-modal-title">Manage Team Members</h2>
              </div>
              <div class="panel-head-actions">
                <button class="button button-ghost" id="close-users" type="button">
                  Close
                </button>
              </div>
            </div>

            <div id="user-list" class="catalog-list user-list"></div>

            <p id="user-feedback" class="feedback auth-feedback" aria-live="polite"></p>
            <form id="add-user-form" class="filters add-user-form">
              <label>
                <span>Name</span>
                <input type="text" name="display_name" autocomplete="name" required />
              </label>
              <label>
                <span>Username</span>
                <input type="text" name="username" autocomplete="username" required />
              </label>
              <label>
                <span>Password</span>
                <input type="password" name="password" autocomplete="new-password" required />
              </label>
              <label>
                <span>Role</span>
                <select name="role">
                  <option value="staff">Staff</option>
                  <option value="manager">Manager</option>
                  <option value="global_admin">Global Admin</option>
                </select>
              </label>
              <button class="button add-user-button" type="submit">Add team member</button>
            </form>
          </section>
        </div>
      </div>

      <div class="modal-backdrop" id="members-modal" hidden aria-hidden="true">
        <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="members-modal-title">
          <section class="panel panel-modal">
            <div class="panel-head">
              <div>
                <h2 id="members-modal-title">Manage Members</h2>
                <p class="modal-subtext" id="members-modal-subtext"></p>
              </div>
              <div class="panel-head-actions">
                <button class="button button-ghost" id="close-members" type="button">
                  Close
                </button>
              </div>
            </div>

            <div class="member-list-head">
              <span>Member</span>
              <span>Role</span>
            </div>
            <div id="members-list" class="catalog-list member-list"></div>
            <p id="members-feedback" class="feedback auth-feedback" aria-live="polite"></p>
            <div class="modal-actions">
              <button class="button button-ghost" id="members-cancel" type="button">
                Cancel
              </button>
              <button class="button" id="members-confirm" type="button">
                Save
              </button>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script src="./app.js?v=20260314-01" defer></script>
  </body>
</html>
