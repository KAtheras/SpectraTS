<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timesheet Studio</title>
    <meta
      name="description"
      content="A standalone timesheet app that can be hosted on Netlify and embedded in WordPress with an iframe."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="app-frame">
        <section class="panel-stack">
          <section class="panel panel-form">
            <div class="panel-head">
              <div>
                <h2 id="form-heading">Add timesheet entry</h2>
              </div>
              <div class="panel-head-actions">
                <button class="button button-ghost" id="open-catalog" type="button">
                  Manage Clients and Projects
                </button>
                <button class="button button-ghost" id="cancel-edit" hidden>
                  Cancel
                </button>
              </div>
            </div>

            <form id="entry-form" class="entry-form">
              <label>
                <span>Team member</span>
                <select name="user" id="entry-user" required></select>
              </label>

              <label>
                <span>Client</span>
                <select name="client" id="entry-client" required></select>
              </label>

              <label>
                <span>Project</span>
                <select name="project" id="entry-project" required></select>
              </label>

              <label class="entry-date-field">
                <span>Date</span>
                <div class="wheel-date-picker">
                  <input type="hidden" name="date" required />
                  <select id="entry-date-month" aria-label="Month"></select>
                  <select id="entry-date-day" aria-label="Day"></select>
                  <select id="entry-date-year" aria-label="Year"></select>
                </div>
              </label>

              <label class="span-2 hours-field">
                <span>Hours</span>
                <div class="entry-helpers entry-helpers-hours">
                  <input type="hidden" name="hours" required />
                  <div class="preset-row">
                    <div class="preset-buttons" id="hour-presets">
                      <button class="chip-button" type="button" data-hours="0.5">0.5h</button>
                      <button class="chip-button" type="button" data-hours="1">1h</button>
                      <button class="chip-button" type="button" data-hours="1.5">1.5h</button>
                      <button class="chip-button" type="button" data-hours="2">2h</button>
                      <button class="chip-button" type="button" data-hours="2.5">2.5h</button>
                      <button class="chip-button" type="button" data-hours="3">3h</button>
                      <label class="other-hours">
                        <input
                          type="number"
                          id="other-hours"
                          min="0.25"
                          max="24"
                          step="0.25"
                          placeholder="Other"
                        />
                      </label>
                    </div>
                  </div>
                </div>
              </label>

              <div class="notes-actions-row span-2">
                <label class="notes-field">
                  <span>Notes</span>
                  <textarea
                    name="notes"
                    rows="1"
                  ></textarea>
                </label>

                <div class="form-actions form-actions-entry">
                  <span class="field-spacer" aria-hidden="true">Notes</span>
                  <button class="button" type="submit" id="submit-entry">
                    Save
                  </button>
                </div>
              </div>
            </form>
          </section>
        </section>

        <section class="panel">
          <div class="panel-head panel-head-stack">
            <div>
              <h2>Logged time</h2>
            </div>

            <form id="filter-form" class="filters">
              <label>
                <span>User</span>
                <select name="user" id="filter-user"></select>
              </label>
              <label>
                <span>Client</span>
                <select name="client" id="filter-client"></select>
              </label>
              <label>
                <span>Project</span>
                <select name="project" id="filter-project"></select>
              </label>
              <label>
                <span>From</span>
                <input type="text" name="from" inputmode="numeric" placeholder="MM/DD/YYYY" />
              </label>
              <label>
                <span>To</span>
                <input type="text" name="to" inputmode="numeric" placeholder="MM/DD/YYYY" />
              </label>
              <label>
                <span>Search</span>
                <input
                  type="search"
                  name="search"
                  placeholder="Project, task, or notes"
                />
              </label>
              <div class="filter-actions">
                <button class="button button-ghost" type="button" id="clear-filters">
                  Clear
                </button>
                <button class="button button-ghost" type="button" id="export-csv">
                  Export CSV
                </button>
                <div class="filter-total" id="filter-total-hours">Total hours: 0.00</div>
              </div>
            </form>
          </div>

          <p id="feedback" class="feedback" aria-live="polite"></p>
          <div id="active-filters" class="active-filters" hidden></div>

          <div class="table-wrap">
            <table class="entries-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>User</th>
                  <th>Client</th>
                  <th>Project</th>
                  <th>Task</th>
                  <th>Hours</th>
                  <th>Notes</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="entries-body"></tbody>
            </table>
          </div>
        </section>
      </main>

      <div class="modal-backdrop" id="catalog-modal" hidden aria-hidden="true">
        <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="catalog-modal-title">
          <section class="panel panel-breakdown panel-modal">
            <div class="panel-head">
              <div>
                <h2 id="catalog-modal-title">Manage Clients</h2>
              </div>
              <div class="panel-head-actions">
                <button
                  class="button button-ghost"
                  id="close-catalog"
                  type="button"
                  data-close-catalog
                >
                  Close
                </button>
              </div>
            </div>
            <div class="catalog-grid">
              <section class="catalog-column">
                <div class="catalog-column-head">
                  <span>Clients</span>
                </div>
                <form id="add-client-form" class="catalog-create">
                  <input
                    type="text"
                    name="client_name"
                    placeholder="Add client"
                    autocomplete="off"
                  />
                  <button class="mini-button" type="submit">Add</button>
                </form>
                <div id="client-list" class="catalog-list"></div>
              </section>
              <section class="catalog-column">
                <div class="catalog-column-head">
                  <span id="project-column-label">Projects</span>
                </div>
                <form id="add-project-form" class="catalog-create">
                  <input
                    type="text"
                    name="project_name"
                    placeholder="Add project"
                    autocomplete="off"
                  />
                  <button class="mini-button" type="submit">Add</button>
                </form>
                <div id="project-list" class="catalog-list"></div>
              </section>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
